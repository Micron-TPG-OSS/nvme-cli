name: Micron - Merge master to mingw

on:
  push:
    branches:
      # Trigger merge when master is synced to upstream.
      - master
  schedule:
    # Cron times are in UTC. Mountain Standard Time (MST) is UTC-7, Mountain Daylight Time (MDT) is UTC-6.
    # This schedule runs at 12:00 PM UTC, which is 5:00 AM MST or 6:00 AM MDT.
    # This is 1 hour after the sync job runs at 11:00 AM UTC (4:00 AM MST).
    # Note: GitHub scheduled workflows are not guaranteed to run at exact times and may start 10-30+ minutes late.
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  merge:
    runs-on: ubuntu-latest

    steps:
      - name: Generate token
        id: generate-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.TACT_SYNC_APP_ID }}
          private-key: ${{ secrets.TACT_SYNC_APP_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: mingw
          fetch-depth: 0
          token: ${{ steps.generate-token.outputs.token }}

      - name: Configure Git identity
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Merge master into mingw
        run: |
          set -euo pipefail
          git fetch origin master
          git merge origin/master -m "Auto-merge master into mingw"

      - name: Push changes
        run: |
          set -euo pipefail
          git push origin mingw

      - name: Notify on merge conflict
        if: failure()
        run: |
          set -euo pipefail
          echo "::error::Failed to merge master into mingw. Manual intervention required."
          exit 1