name: Micron: Merge master to mingw

on:
  workflow_run:
    workflows: ["Micron: Sync master and merge mingw"]
    types:
      - completed
  workflow_dispatch:

jobs:
  merge:
    runs-on: ubuntu-latest
    concurrency:
      group: merge-master-to-mingw
      cancel-in-progress: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: jlmunn/mingw
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git identity
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Merge master into jlmunn/mingw
        run: |
          set -euo pipefail
          git fetch origin jlmunn/master
          git merge origin/jlmunn/master -m "Auto-merge jlmunn/master into jlmunn/mingw"

      - name: Push changes
        run: |
          set -euo pipefail
          git push origin jlmunn/mingw

      - name: Notify on merge conflict
        if: failure()
        run: |
          set -euo pipefail
          echo "::error::Failed to merge master into jlmunn/mingw. Manual intervention required."
          exit 1